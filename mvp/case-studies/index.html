<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case studies · Valentino Scicolone · vales.ae</title>
<meta name="description" content="AI marketing case studies across finance, luxury, tourism, telecom and consumer. Strategy, measurement and media, delivered end to end.">
<link rel="icon" href="/aimarketingmaturity/assets/favicon.ico" sizes="any">
<link rel="icon" href="/aimarketingmaturity/assets/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--blue:#1A56FF;--cyan:#00D4FF;--navy:#0D1F5C;--mid:#4D7BFF;--ice:#F4F7FF;--muted:#5b6aa0;--line:rgba(13,31,92,.10);--maxw:1180px;--ease:cubic-bezier(.16,.84,.44,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--navy);background:#fff;-webkit-font-smoothing:antialiased}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
a{color:inherit;text-decoration:none}
nav{border-bottom:1px solid var(--line);padding:16px 0;position:sticky;top:0;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);z-index:20}
nav .wrap{display:flex;align-items:center;justify-content:space-between}
.brand{font-weight:800;font-size:17px}.brand span{color:var(--blue)}
.navlink{font-weight:600;font-size:14px;color:var(--muted);transition:.2s}.navlink:hover{color:var(--blue)}
/* ---- grid view ---- */
.head{padding:52px 0 8px}
.head h1{font-size:clamp(30px,4.4vw,46px);font-weight:800;letter-spacing:-.02em}
.head p{color:var(--muted);font-weight:500;margin-top:10px;max-width:640px;line-height:1.5}
.filters{display:flex;flex-wrap:wrap;gap:12px;align-items:center;padding:28px 0 6px}
.filters .lbl{font-size:13px;font-weight:700;color:var(--muted)}
.sel{position:relative}
select{appearance:none;font-family:inherit;font-size:14px;font-weight:700;color:var(--navy);background:#fff;border:1px solid var(--line);border-radius:100px;padding:11px 40px 11px 18px;cursor:pointer;transition:.15s}
select:hover{border-color:var(--mid)}
select.act{background:var(--blue);color:#fff;border-color:var(--blue)}
.sel::after{content:"▾";position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:11px;pointer-events:none;color:var(--muted)}
.sel.act::after{color:#fff}
.reset{font-size:13px;font-weight:700;color:var(--blue);cursor:pointer;background:none;border:none;padding:8px}
.count{font-size:13px;color:var(--muted);font-weight:600;padding:18px 0 26px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:26px;padding-bottom:80px}
.card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 18px 44px -24px rgba(13,31,92,.35);transition:transform .3s var(--ease),box-shadow .3s;cursor:pointer;display:flex;flex-direction:column}
.card:hover{transform:translateY(-5px);box-shadow:0 28px 60px -26px rgba(13,31,92,.45)}
.thumb{position:relative;aspect-ratio:16/10;overflow:hidden;background:linear-gradient(150deg,var(--navy),var(--blue))}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb.photo::after{content:"";position:absolute;inset:0;background:linear-gradient(160deg,rgba(26,86,255,.14),rgba(13,31,92,.12) 45%,rgba(13,31,92,.5));pointer-events:none}
.thumb .gtext{position:absolute;inset:0;display:flex;align-items:flex-end;padding:20px;color:rgba(255,255,255,.9);font-weight:700;font-size:15px;line-height:1.3}
.badge{position:absolute;top:13px;left:13px;z-index:2;background:rgba(255,255,255,.95);border-radius:100px;font-size:10px;font-weight:800;letter-spacing:.07em;padding:6px 11px;color:var(--blue)}
.mkt{position:absolute;top:13px;right:13px;z-index:2;background:rgba(0,212,255,.92);border-radius:100px;font-size:10px;font-weight:800;letter-spacing:.06em;padding:6px 11px;color:#03303c}
.body{padding:20px 22px 22px;display:flex;flex-direction:column;flex:1}
.ml{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:9px}
.card h3{font-size:18px;font-weight:800;line-height:1.25;letter-spacing:-.01em;flex:1}
.cm{margin-top:16px;display:flex;align-items:baseline;gap:9px;border-top:1px solid var(--line);padding-top:14px}
.cm .v{font-size:24px;font-weight:800;background:linear-gradient(90deg,var(--blue),var(--mid));-webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap}
.cm .l{font-size:12.5px;font-weight:600;color:var(--muted)}
.empty{padding:60px 0;text-align:center;color:var(--muted);font-weight:600}
/* ---- detail view ---- */
.back{display:inline-flex;gap:8px;font-weight:700;font-size:14px;color:var(--muted);padding:30px 0 0;cursor:pointer;transition:.2s}.back:hover{color:var(--blue)}
.hero{padding:26px 0 0;display:grid;grid-template-columns:1.15fr .85fr;gap:44px;align-items:start}
.crumbs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.chip{font-size:12px;font-weight:700;letter-spacing:.03em;padding:6px 12px;border-radius:100px;border:1px solid var(--line);color:var(--muted)}
.chip.type{background:var(--blue);border-color:var(--blue);color:#fff}.chip.market{background:rgba(0,212,255,.1);border-color:transparent;color:#0092b8}
.hero h1{font-weight:800;font-size:clamp(26px,3.4vw,42px);line-height:1.1;letter-spacing:-.02em}
.hsub{margin-top:14px;font-size:17px;color:var(--muted);font-weight:500;line-height:1.5}
.tk{margin-top:26px;padding-top:24px;border-top:1px solid var(--line)}
.lbl2{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px}
.tk .lbl2{color:var(--blue)}.tk p{font-size:19px;font-weight:700;line-height:1.45}
.hch{margin-top:22px;padding-top:22px;border-top:1px solid var(--line)}.hch .lbl2{color:var(--muted)}.hch p{font-size:15px;font-weight:500;line-height:1.65}
.flow .s{display:block}.flow .s+.s{margin-top:.5em}
.proof{background:var(--navy);border-radius:24px;overflow:hidden;color:#fff;position:sticky;top:88px}
.proof .pic{aspect-ratio:16/10;background:linear-gradient(150deg,#12245f,var(--blue));position:relative}
.proof .pic img{width:100%;height:100%;object-fit:cover}
.proof .pic::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(13,31,92,0),rgba(13,31,92,.35))}
.proof .in{padding:28px}
.proof .rl{font-size:11px;font-weight:800;letter-spacing:.14em;color:var(--cyan);text-transform:uppercase;margin-bottom:16px}
.stat{padding:14px 0}.stat+.stat{border-top:1px solid rgba(255,255,255,.12)}
.stat .v{font-size:clamp(30px,4vw,42px);font-weight:800;letter-spacing:-.02em;background:linear-gradient(90deg,var(--cyan),var(--mid));-webkit-background-clip:text;background-clip:text;color:transparent}
.stat .l{font-size:13px;font-weight:600;color:rgba(255,255,255,.72);margin-top:2px}
.pfoot{margin-top:18px;padding-top:18px;border-top:1px solid rgba(255,255,255,.12);display:flex;flex-wrap:wrap;gap:18px}
.pfoot div h4{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:6px}
.pfoot div p{font-size:13px;font-weight:700}
.story{margin:56px 0;display:grid;grid-template-columns:1fr 1.1fr;gap:24px;align-items:stretch}
.col{border-radius:20px;padding:32px}
.col.angle{background:var(--navy);color:#fff}.col.angle .lbl2{color:rgba(255,255,255,.5)}.col.angle p{font-size:16px;line-height:1.6;font-weight:500;color:rgba(255,255,255,.94)}
.col.did{background:var(--ice)}.col.did .lbl2{color:var(--muted)}
.did ul{list-style:none;margin-top:6px}
.did li{display:flex;gap:14px;align-items:flex-start;padding:15px 0;border-bottom:1px solid var(--line);font-size:15.5px;font-weight:600}
.did li:last-child{border-bottom:none}
.did .n{flex:0 0 26px;height:26px;border-radius:7px;background:rgba(26,86,255,.09);color:var(--blue);font-size:12px;font-weight:800;display:grid;place-items:center}
.svc{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding-bottom:20px}
.svc .lbl2{color:var(--muted);margin:0 6px 0 0}
.svc .tag{font-size:13px;font-weight:700;padding:6px 12px;border-radius:100px;background:rgba(26,86,255,.07);color:var(--blue)}
.cta{background:var(--ice);border-radius:24px;padding:40px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:70px}
.cta p{font-size:20px;font-weight:800;letter-spacing:-.01em;max-width:560px;line-height:1.3}
.btn{background:var(--blue);color:#fff;font-weight:700;font-size:15px;padding:15px 28px;border-radius:100px;white-space:nowrap;transition:transform .2s var(--ease),box-shadow .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px -8px rgba(26,86,255,.5)}
footer{border-top:1px solid var(--line);padding:26px 0;font-size:13px;color:var(--muted)}
footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}
.load{padding:80px 0;text-align:center;color:var(--muted);font-weight:600}
@media(max-width:860px){.hero{grid-template-columns:1fr}.proof{position:static}.story{grid-template-columns:1fr}.grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.grid{grid-template-columns:1fr}.cta{flex-direction:column;align-items:flex-start}}
</style></head><body>
<nav><div class="wrap">
  <a class="brand" href="/">Valentino Scicolone <span>·</span> vales.ae</a>
  <a class="navlink" href="/">← Home</a>
</div></nav>
<div id="app"><div class="load wrap">Loading case studies…</div></div>
<footer><div class="wrap"><span>Valentino Scicolone · AI Marketing Consultant · Dubai</span><span>© 2026 vales.ae</span></div></footer>
<script>
const PID="7fvx0718",DS="production";
const Q=`*[_type=="caseStudy"]|order(featured desc, date desc){_id,title,subtitle,"slug":slug.current,"year":string(date),date,featured,market,engagementType,"industry":industry->title,"services":services[]->title,competencies,cardMetric,metrics,takeaway,challenge,angle,actions,"img":coverImage.asset->url}`;
const CTA="The strategy is different every time. The starting point never is: know where you stand.";
const CMAP={"curiosity":"Curiosity","creativity":"Creativity","critical-thinking":"Critical thinking","empathy":"Empathy"};
let DATA=[],F={industry:"",service:"",year:""};
const yr=d=>(d||"").slice(0,4);
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const flow=t=>esc(t).split(/(?<=\.)\s+(?=[A-Z"'])/).map(s=>`<span class="s">${s}</span>`).join("");
const uniq=a=>[...new Set(a)];
function fetchData(){
  const url=`https://${PID}.apicdn.sanity.io/v2024-01-01/data/query/${DS}?query=`+encodeURIComponent(Q);
  return fetch(url).then(r=>r.json()).then(j=>{DATA=j.result||[];route();});
}
function route(){ (location.hash.slice(1)) ? detail(decodeURIComponent(location.hash.slice(1))) : gridView(); window.scrollTo(0,0); }
/* ---------- GRID ---------- */
function gridView(){
  const inds=uniq(DATA.map(d=>d.industry).filter(Boolean)).sort();
  const svcs=uniq(DATA.flatMap(d=>d.services||[]).filter(Boolean)).sort();
  const years=uniq(DATA.map(d=>yr(d.year))).sort((a,b)=>b-a);
  const opt=(v,cur)=>`<option value="${esc(v)}"${v===cur?" selected":""}>${esc(v)}</option>`;
  let items=DATA.filter(d=>(!F.industry||d.industry===F.industry)&&(!F.service||(d.services||[]).includes(F.service))&&(!F.year||yr(d.year)===F.year));
  const active=v=>v?" act":"";
  document.getElementById("app").innerHTML=`
   <header class="head wrap">
     <h1>Case studies</h1>
     <p>Ten years across finance, luxury, tourism, telecom and consumer, from strategy to measurement to media. Every engagement delivered under NDA.</p>
   </header>
   <div class="filters wrap">
     <span class="lbl">Filter by</span>
     <div class="sel${active(F.industry)}"><select id="fi"><option value="">Industry</option>${inds.map(i=>opt(i,F.industry)).join("")}</select></div>
     <div class="sel${active(F.service)}"><select id="fs"><option value="">Service</option>${svcs.map(s=>opt(s,F.service)).join("")}</select></div>
     <div class="sel${active(F.year)}"><select id="fy"><option value="">Year</option>${years.map(y=>opt(y,F.year)).join("")}</select></div>
     ${(F.industry||F.service||F.year)?`<button class="reset" id="fr">Reset ✕</button>`:""}
   </div>
   <div class="count wrap">${items.length} case ${items.length===1?"study":"studies"}</div>
   <div class="grid wrap">${items.map(card).join("")||`<div class="empty">No case studies match these filters.</div>`}</div>`;
  document.getElementById("fi").onchange=e=>{F.industry=e.target.value;gridView();};
  document.getElementById("fs").onchange=e=>{F.service=e.target.value;gridView();};
  document.getElementById("fy").onchange=e=>{F.year=e.target.value;gridView();};
  const fr=document.getElementById("fr"); if(fr) fr.onclick=()=>{F={industry:"",service:"",year:""};gridView();};
  document.querySelectorAll("[data-slug]").forEach(c=>c.onclick=()=>{location.hash=encodeURIComponent(c.dataset.slug);});
}
function card(d){
  const cm=d.cardMetric||{};
  const thumb=d.img
    ? `<div class="thumb photo"><span class="badge">CASE STUDY</span>${d.market?`<span class="mkt">${esc(d.market)}</span>`:""}<img loading="lazy" src="${d.img}?w=760&h=475&fit=crop&auto=format" alt=""></div>`
    : `<div class="thumb"><span class="badge">CASE STUDY</span>${d.market?`<span class="mkt">${esc(d.market)}</span>`:""}<div class="gtext">${esc(d.industry||"")}</div></div>`;
  return `<div class="card" data-slug="${esc(d.slug)}">${thumb}<div class="body">
    <div class="ml">${yr(d.year)} · ${esc(d.industry||"")}</div>
    <h3>${esc(d.title)}</h3>
    ${cm.value?`<div class="cm"><span class="v">${esc(cm.value)}</span><span class="l">${esc(cm.label||"")}</span></div>`:""}
  </div></div>`;
}
/* ---------- DETAIL ---------- */
function detail(slug){
  const d=DATA.find(x=>x.slug===slug); if(!d){gridView();return;}
  const m=d.metrics||[]; const comps=(d.competencies||[]).map(c=>CMAP[c]||c);
  const pic=d.img?`<div class="pic"><img src="${d.img}?w=900&h=560&fit=crop&auto=format" alt=""></div>`:`<div class="pic"></div>`;
  const statHTML=m.filter(s=>s&&s.value).map(s=>`<div class="stat"><div class="v">${esc(s.value)}</div><div class="l">${esc(s.label||"")}</div></div>`).join("")||"";
  document.getElementById("app").innerHTML=`
   <div class="wrap"><span class="back" id="back">← All case studies</span></div>
   <header class="hero wrap">
     <div>
       <div class="crumbs">
         <span class="chip type">CASE STUDY</span><span class="chip">${yr(d.year)}</span>
         ${d.market?`<span class="chip market">${esc(d.market)}</span>`:""}
         ${d.industry?`<span class="chip">${esc(d.industry)}</span>`:""}
         ${d.engagementType?`<span class="chip">${esc(d.engagementType)}</span>`:""}
       </div>
       <h1>${esc(d.title)}</h1>
       ${d.subtitle?`<p class="hsub">${esc(d.subtitle)}</p>`:""}
       <div class="tk"><div class="lbl2">The takeaway</div><p>${esc(d.takeaway)}</p></div>
       ${d.challenge?`<div class="hch"><div class="lbl2">The challenge</div><p class="flow">${flow(d.challenge)}</p></div>`:""}
     </div>
     <aside class="proof">${pic}<div class="in">
       <div class="rl">The result</div>
       ${statHTML||`<div class="stat"><div class="l" style="color:rgba(255,255,255,.6)">Results available on request</div></div>`}
       <div class="pfoot">
         ${d.market?`<div><h4>Market</h4><p>${esc(d.market)}</p></div>`:""}
         ${d.engagementType?`<div><h4>Engagement</h4><p>${esc(d.engagementType)}</p></div>`:""}
         ${comps.length?`<div><h4>Won with</h4><p>${comps.map(esc).join(" · ")}</p></div>`:""}
       </div>
     </div></aside>
   </header>
   <section class="story wrap">
     <div class="col angle"><div class="lbl2">The angle</div><p class="flow">${flow(d.angle)}</p></div>
     <div class="col did"><div class="lbl2">What I did</div><ul>${(d.actions||[]).map((a,i)=>`<li><span class="n">${i+1}</span>${esc(a)}</li>`).join("")}</ul></div>
   </section>
   ${(d.services||[]).length?`<div class="svc wrap"><span class="lbl2">Services</span>${d.services.map(s=>`<span class="tag">${esc(s)}</span>`).join("")}</div>`:""}
   <div class="wrap"><div class="cta"><p>${CTA}</p><a class="btn" href="https://vales.ae/aimarketingmaturity">Start your free assessment today →</a></div></div>`;
  document.getElementById("back").onclick=()=>{location.hash="";};
}
window.addEventListener("hashchange",route);
fetchData();
</script>
</body></html>
